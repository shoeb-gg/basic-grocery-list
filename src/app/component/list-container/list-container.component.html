<div class="list-card">
  @if (isEmpty()) {
    <div class="empty-state">
      <div class="empty-icon">🛒</div>
      <p class="empty-title">Your list is empty</p>
      <p class="empty-hint">Add your first item below!</p>
    </div>
  } @else {
    <cdk-virtual-scroll-viewport
      class="ion-content-scroll-host list-viewport"
      [itemSize]="ROW_HEIGHT"
      [style.height.px]="viewportHeight()"
      cdkDropList
      [cdkDropListSortPredicate]="sortPredicate"
      (cdkDropListDropped)="drop($event)"
    >
      <div
        class="v-row"
        *cdkVirtualFor="let row of rows(); trackBy: trackRow"
        cdkDrag
        [cdkDragData]="row"
        [cdkDragDisabled]="row.kind !== 'item' || row.section !== 'todo'"
      >
        @switch (row.kind) {
          @case ('done-header') {
            <div class="completed-divider"><span>done ({{ row.count }})</span></div>
          }
          @case ('todo-header') {
            <div class="completed-divider"><span>to do ({{ row.count }})</span></div>
          }
          @default {
            <ion-item-sliding>
              <ion-item>
                <ion-checkbox
                  class="text-lg"
                  color="tertiary"
                  labelPlacement="end"
                  alignment="start"
                  [checked]="row.item.checked"
                  (ionChange)="checkItem(row.item.id)"
                  [attr.aria-label]="(row.item.checked ? 'Mark ' + row.item.itemName + ' as incomplete' : 'Mark ' + row.item.itemName + ' as complete')"
                  >&nbsp;</ion-checkbox
                >
                <ion-input
                  enterkeyhint="done"
                  mode="ios"
                  [value]="row.item.itemName"
                  (ionInput)="valueChange(row.item.id, $event)"
                  (ionBlur)="blurItem(row.item.id)"
                  [class.line-through]="row.section === 'done'"
                >
                </ion-input>
                @if (row.section === 'todo') {
                  <ion-icon
                    class="drag-handle"
                    name="reorder-three-outline"
                    slot="end"
                    cdkDragHandle
                    aria-label="Reorder"
                  ></ion-icon>
                }
              </ion-item>
              <ion-item-options side="start">
                <ion-item-option color="danger" (click)="deleteItemWithUndo(row.item)">
                  <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
                </ion-item-option>
              </ion-item-options>
            </ion-item-sliding>
          }
        }
      </div>
    </cdk-virtual-scroll-viewport>
  }

  <app-input-container></app-input-container>
</div>
