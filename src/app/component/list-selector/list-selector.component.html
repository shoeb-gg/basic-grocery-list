<div class="list-selector">
  <ion-button fill="solid" size="small" class="swap-btn" (click)="openSelectDropdown()">
    <ion-icon slot="icon-only" name="list-outline" color="tertiary"></ion-icon>
  </ion-button>

  <ion-select
    [value]="listStore.activeListId()"
    (ionChange)="onListChange($event)"
    interface="action-sheet"
    class="list-dropdown"
  >
    @for (list of listStore.lists(); track list.id) {
      <ion-select-option [value]="list.id">{{ list.name }}</ion-select-option>
    }
    <ion-select-option [value]="NEW_LIST_ID">+ New List</ion-select-option>
  </ion-select>

  <div class="actions">
    <ion-button fill="solid" size="small" (click)="openRenameAlert()">
      <ion-icon slot="icon-only" name="create-outline" color="tertiary"></ion-icon>
    </ion-button>

    @if (canDelete) {
      <ion-button fill="solid" size="small" class="danger-btn" (click)="openDeleteAlert()">
        <ion-icon slot="icon-only" name="trash-outline" color="danger"></ion-icon>
      </ion-button>
    }
  </div>
</div>

<!-- Rename Alert -->
<ion-alert
  [isOpen]="isRenameAlertOpen"
  header="Rename List"
  [inputs]="renameAlertInputs"
  [buttons]="renameAlertButtons"
  (didDismiss)="onRenameResult($event)"
></ion-alert>

<!-- Delete Alert -->
<ion-alert
  [isOpen]="isDeleteAlertOpen"
  header="Delete List"
  message="Are you sure you want to delete this list and all its items?"
  [buttons]="deleteAlertButtons"
  (didDismiss)="onDeleteResult($event)"
></ion-alert>

<!-- New List Alert -->
<ion-alert
  [isOpen]="isNewListAlertOpen"
  header="New List"
  [inputs]="newListAlertInputs"
  [buttons]="newListAlertButtons"
  (didDismiss)="onNewListResult($event)"
></ion-alert>
