<!-- Chip bar for list switching -->
<div class="chip-bar-wrapper">
<div class="chip-bar">
  <button class="chip add-chip" (click)="openNewListAlert()" aria-label="Create new list">+</button>
  @for (list of listStore.lists(); track list.id) {
    <button
      class="chip"
      [class.active]="list.id === listStore.activeListId()"
      (click)="switchTo(list.id)"
      [attr.aria-label]="'Switch to ' + list.name"
    >
      {{ list.name }}
    </button>
  }
</div>
</div>

<!-- Active list header -->
<div class="list-header">
  <div class="actions">
    @if (canDelete) {
      <ion-button fill="solid" size="small" class="danger-btn" (click)="openDeleteAlert()" aria-label="Delete list">
        <ion-icon slot="icon-only" name="trash-outline" color="danger"></ion-icon>
      </ion-button>
    }
    <ion-button fill="solid" size="small" (click)="openRenameAlert()" aria-label="Rename list">
      <ion-icon slot="icon-only" name="create-outline" color="tertiary"></ion-icon>
    </ion-button>
  </div>
  <h2 class="list-title">{{ activeListName }}</h2>
</div>

<!-- Rename Alert -->
<ion-alert
  [isOpen]="isRenameAlertOpen"
  header="Rename List"
  [inputs]="renameAlertInputs"
  [buttons]="renameAlertButtons"
  (didDismiss)="onRenameResult($event)"
></ion-alert>

<!-- Delete Alert -->
<ion-alert
  [isOpen]="isDeleteAlertOpen"
  header="Delete List"
  message="Are you sure you want to delete this list and all its items?"
  [buttons]="deleteAlertButtons"
  (didDismiss)="onDeleteResult($event)"
></ion-alert>

<!-- New List Alert -->
<ion-alert
  [isOpen]="isNewListAlertOpen"
  header="New List"
  [inputs]="newListAlertInputs"
  [buttons]="newListAlertButtons"
  (didDismiss)="onNewListResult($event)"
></ion-alert>
